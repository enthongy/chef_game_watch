name: sonic_soccer
description: "A Flutter recreation of a 2003 Sega/McDonald's Sonic Soccer LCD handheld game — features 5 customizable device shells, native audio, and active/ghost rendering layers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
