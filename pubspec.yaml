name: game_watch_chef
description: "A Flutter recreation of Nintendo's 1981 Game & Watch: Chef — discrete arc physics, LCD ghost layer, native Windows Beep via FFI, neumorphic controls."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
